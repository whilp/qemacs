name: ci

on:
  pull_request:
    paths:
      - '**'
      - '!.gitignore'
      - '!LICENSE'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - '*'

jobs:
  ci:
    name: Build and test (cosmocc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and test
        run: make ci
